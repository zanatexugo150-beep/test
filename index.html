const _t={};
function rateCheck(email){
  const k=email.toLowerCase(),now=Date.now();
  if(!_t[k])_t[k]={n:0,first:now,blocked:0};
  const a=_t[k];
  if(a.blocked>now)throw new Error(`Bloqueado por ${Math.ceil((a.blocked-now)/60000)} min.`);
  if(now-a.first>900000){_t[k]={n:1,first:now,blocked:0};return;}
  if(++a.n>=5){a.blocked=now+1800000;throw new Error("Bloqueado 30 min.");}
}
function rateReset(e){delete _t[e.toLowerCase()];}
function pwCheck(p){
  const e=[];
  if(p.length<8)e.push("Mínimo 8 caracteres");
  if(!/[A-Z]/.test(p))e.push("1 maiúscula");
  if(!/[a-z]/.test(p))e.push("1 minúscula");
  if(!/\d/.test(p))e.push("1 número");
  if(!/[^A-Za-z0-9]/.test(p))e.push("1 especial");
  return e;
}

const _cache={};
async function buscarLivros(q){
  if(_cache[q])return _cache[q];
  const[ol,gb]=await Promise.all([_ol(q),_gb(q)]);
  const seen=new Set(ol.map(r=>r.titulo.toLowerCase()));
  const r=[...ol];
  for(const x of gb)if(!seen.has(x.titulo.toLowerCase())&&r.length<12){seen.add(x.titulo.toLowerCase());r.push(x);}
  return _cache[q]=r;
}
async function _ol(q){
  try{
    const d=await(await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(q)}&fields=key,title,author_name,cover_i,first_publish_year,subject,number_of_pages_median,ia&limit=10`)).json();
    const r=[],seen=new Set();
    for(const x of d.docs||[]){
      if(!x.cover_i)continue;
      const titulo=x.title||q,k=titulo.toLowerCase();
      if(seen.has(k))continue;seen.add(k);
      r.push({id:`ol_${x.cover_i}`,titulo,autor:(x.author_name||[]).join(", ")||"—",
        capa:`https://covers.openlibrary.org/b/id/${x.cover_i}-L.jpg`,
        ano:x.first_publish_year?String(x.first_publish_year):"",
        paginas:x.number_of_pages_median||0,genero:(x.subject||[]).slice(0,2),
        sinopse:"",fonte:"OL",ia:(x.ia&&x.ia[0])||null});
      if(r.length>=6)break;
    }
    return r;
  }catch{return[];}
}
async function _gb(q){
  try{
    const d=await(await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(q)}&maxResults=10`)).json();
    const r=[],seen=new Set();
    for(const item of d.items||[]){
      const info=item.volumeInfo||{},img=info.imageLinks;
      if(!img)continue;
      const raw=img.extraLarge||img.large||img.medium||img.thumbnail;
      if(!raw)continue;
      const capa=raw.replace(/^http:\/\//,"https://").replace(/zoom=\d/,"zoom=3");
      const titulo=info.title||q,k=titulo.toLowerCase();
      if(seen.has(k))continue;seen.add(k);
      r.push({id:item.id,titulo,autor:(info.authors||[]).join(", ")||"—",capa,
        ano:info.publishedDate?info.publishedDate.slice(0,4):"",
        paginas:info.pageCount||0,genero:info.categories||[],
        sinopse:info.description||"",fonte:"GB",previa:info.previewLink||"",ia:null});
      if(r.length>=6)break;
    }
    return r;
  }catch{return[];}
}
async function capaCover(titulo,autor){
  const k=`cv_${titulo}_${autor}`;
  if(_cache[k]!==undefined)return _cache[k];
  const r=await buscarLivros(`${titulo} ${autor}`);
  return _cache[k]=r[0]?.capa||null;
}
async function buscarDownload(livro){
  if(livro.ia){
    try{
      const d=await(await fetch(`https://archive.org/metadata/${livro.ia}/files`)).json();
      const f=d.result||[];
      const epub=f.find(x=>x.name?.endsWith(".epub"));
      const pdf=f.find(x=>x.name?.endsWith(".pdf")&&!x.name.includes("_text"));
      const txt=f.find(x=>x.name?.endsWith("_djvu.txt"));
      return{ok:true,fonte:"Archive.org",ler:`https://archive.org/details/${livro.ia}`,
        epub:epub?`https://archive.org/download/${livro.ia}/${epub.name}`:null,
        pdf:pdf?`https://archive.org/download/${livro.ia}/${pdf.name}`:null,
        txt:txt?`https://archive.org/download/${livro.ia}/${txt.name}`:null};
    }catch{}
  }
  try{
    const d=await(await fetch(`https://gutendex.com/books/?search=${encodeURIComponent(livro.titulo)}`)).json();
    const g=(d.results||[]).find(b=>b.title?.toLowerCase().includes(livro.titulo.toLowerCase().slice(0,8)));
    if(g){const f=g.formats||{};return{ok:true,fonte:"Gutenberg",
      ler:f["text/html"]||`https://www.gutenberg.org/ebooks/${g.id}`,
      epub:f["application/epub+zip"]||null,pdf:f["application/pdf"]||null,
      txt:f["text/plain; charset=utf-8"]||null};}
  }catch{}
  return{ok:false};
}

const TelaLogin=()=>{
  const T=LIGHT;
  const[email,setEmail]=useState("");const[senha,setSenha]=useState("");
  const[erro,setErro]=useState("");const[info,setInfo]=useState("");
  const[load,setLoad]=useState(false);const[verS,setVerS]=useState(false);const[esq,setEsq]=useState(false);
  const entrar=async e=>{
    e.preventDefault();setErro("");setInfo("");
    if(!emailOk(email)){setErro("E-mail inválido.");return;}
    setLoad(true);
    try{
      if(esq){await auth.sendPasswordResetEmail(email);setInfo("E-mail de recuperação enviado!");setEsq(false);}
      else{rateCheck(email);await auth.signInWithEmailAndPassword(email,senha);rateReset(email);await auditLog(auth.currentUser?.uid,"LOGIN",{email});}
    }catch(er){await auditLog("anon","FAIL",{email});setErro(er.message||fbe(er.code));}
    finally{setLoad(false);}
  };
  return(
    <div style={{minHeight:"100vh",background:T.head,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:T.card,borderRadius:24,width:"100%",maxWidth:380,padding:"36px 28px",boxShadow:"0 24px 64px rgba(74,63,92,.2)"}}>
        <div style={{textAlign:"center",marginBottom:28}}>
          <div style={{fontSize:56,marginBottom:8}}>📖</div>
          <div style={{color:T.text,fontSize:22,fontWeight:900}}>Diário de Leitura</div>
          <div style={{color:T.muted,fontSize:13,marginTop:4}}>{esq?"Recuperar senha":"Entre na sua conta"}</div>
        </div>
        {erro&&<div style={{background:T.redLight,border:`1px solid ${T.red}30`,borderRadius:10,padding:"10px 14px",marginBottom:14,color:T.red,fontSize:13}}>⚠️ {erro}</div>}
        {info&&<div style={{background:T.mintLight,border:`1px solid ${T.mint}`,borderRadius:10,padding:"10px 14px",marginBottom:14,color:T.mintDark,fontSize:13}}>✓ {info}</div>}
        <form onSubmit={entrar} style={{display:"flex",flexDirection:"column",gap:14}}>
          <Campo label="E-mail" val={email} set={v=>setEmail(v.trim())} type="email" ph="seu@email.com" T={T}/>
          {!esq&&(
            <div>
              <label style={{color:T.mid,fontSize:12,fontWeight:700,display:"block",marginBottom:5}}>Senha</label>
              <div style={{position:"relative"}}>
                <input type={verS?"text":"password"} value={senha} onChange={e=>setSenha(e.target.value)} placeholder="Sua senha" required
                  style={{width:"100%",background:T.bgAlt,border:`1.5px solid ${T.border}`,borderRadius:12,padding:"10px 40px 10px 14px",color:T.text,fontSize:13,outline:"none",boxSizing:"border-box"}}/>
                <button type="button" onClick={()=>setVerS(v=>!v)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:18,color:T.muted}}>{verS?"🙈":"👁️"}</button>
              </div>
            </div>
          )}
          <button type="submit" disabled={load}
            style={{background:load?T.border:`linear-gradient(135deg,${T.rose},${T.roseDark})`,color:"#fff",border:"none",borderRadius:14,padding:"14px 0",fontWeight:800,fontSize:15,cursor:load?"not-allowed":"pointer",transition:"all .2s"}}>
            {load?"⏳ Aguarde...":esq?"📧 Enviar e-mail":"🔐 Entrar"}
          </button>
          <button type="button" onClick={()=>{setEsq(v=>!v);setErro("");setInfo("");}}
            style={{background:"none",border:"none",color:T.lavDark,fontSize:13,cursor:"pointer",textDecoration:"underline",textAlign:"center"}}>
            {esq?"← Voltar":"Esqueci minha senha"}
          </button>
        </form>
        <div style={{marginTop:20,padding:"12px",background:T.lavLight,borderRadius:10,fontSize:11,color:T.mid,textAlign:"center",lineHeight:1.6}}>
          🔒 Conexão segura · Contas criadas pelo administrador
        </div>
      </div>
    </div>
  );
};

const TelaAdmin=({user,perfil,sair})=>{
  const T=LIGHT;
  const[aba,setAba]=useState("users");
  const[users,setUsers]=useState([]);const[logs,setLogs]=useState([]);
  const[load,setLoad]=useState(false);const[msg,setMsg]=useState({t:"",m:""});
  const[nNome,setNNome]=useState("");const[nEmail,setNEmail]=useState("");
  const[nSenha,setNSenha]=useState("");const[nRole,setNRole]=useState("user");const[pErros,setPErros]=useState([]);
  const ok=m=>{setMsg({t:"ok",m});setTimeout(()=>setMsg({t:"",m:""}),5000);};
  const er=m=>{setMsg({t:"err",m});setTimeout(()=>setMsg({t:"",m:""}),6000);};
  const loadU=async()=>{const s=await db.collection("users").get();setUsers(s.docs.map(d=>({id:d.id,...d.data()})));};
  const loadL=async()=>{try{const s=await db.collection("logs").orderBy("ts","desc").limit(50).get();setLogs(s.docs.map(d=>({id:d.id,...d.data()})));}catch{setLogs([]);}};
  useEffect(()=>{loadU();},[]);
  useEffect(()=>{if(aba==="logs")loadL();},[aba]);

  const criarUser=async e=>{
    e.preventDefault();
    if(!emailOk(nEmail)){er("E-mail inválido.");return;}
    const erros=pwCheck(nSenha);setPErros(erros);if(erros.length)return;
    setLoad(true);
    try{
      const c=await auth.createUserWithEmailAndPassword(nEmail,nSenha);
      await c.user.sendEmailVerification();
      await db.collection("users").doc(c.user.uid).set({nome:san(nNome),email:nEmail.toLowerCase(),role:nRole,bloqueado:false,criadoPor:user.uid,criadoEm:firebase.firestore.FieldValue.serverTimestamp()});
      await auditLog(user.uid,"CRIAR_USER",{email:nEmail,role:nRole});
      ok(`Usuário "${nEmail}" criado!`);setNNome("");setNEmail("");setNSenha("");setNRole("user");setPErros([]);loadU();
    }catch(e){er(fbe(e.code)||e.message);}finally{setLoad(false);}
  };
  const mudarRole=async(uid,role)=>{await db.collection("users").doc(uid).update({role,atEm:firebase.firestore.FieldValue.serverTimestamp()});await auditLog(user.uid,"ROLE",{uid,role});ok("Papel alterado!");loadU();};
  const bloquear=async(uid,bl)=>{await db.collection("users").doc(uid).update({bloqueado:!bl});await auditLog(user.uid,bl?"DESBLOQ":"BLOQ",{uid});ok(bl?"Desbloqueado!":"Bloqueado!");loadU();};
  const remover=async(uid,email)=>{if(!confirm(`Remover ${email}?`))return;await db.collection("users").doc(uid).delete();await auditLog(user.uid,"REMOVER",{uid,email});ok("Removido.");loadU();};

  const ABAS=[{id:"users",l:"👥 Usuários"},{id:"novo",l:"➕ Novo"},{id:"logs",l:"📋 Logs"},{id:"senha",l:"🔑 Senha"}];

  return(
    <div style={{minHeight:"100vh",background:T.bg}}>
      <div style={{background:T.head,borderBottom:`1px solid ${T.border}`,position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:900,margin:"0 auto",padding:"0 16px",display:"flex",alignItems:"center",gap:12,height:54}}>
          <span style={{fontSize:20}}>🛡️</span>
          <div style={{flex:1}}><div style={{color:T.text,fontSize:14,fontWeight:900}}>Painel Administrador</div><div style={{color:T.muted,fontSize:11}}>{perfil?.nome||user?.email}</div></div>
          <button onClick={sair} style={{background:T.redLight,color:T.red,border:"none",borderRadius:10,padding:"7px 14px",fontWeight:700,fontSize:12,cursor:"pointer"}}>Sair 🚪</button>
        </div>
        <div style={{maxWidth:900,margin:"0 auto",padding:"0 16px",display:"flex",overflowX:"auto",scrollbarWidth:"none"}}>
          {ABAS.map(a=><button key={a.id} onClick={()=>setAba(a.id)} style={{padding:"10px 14px",background:"none",border:"none",cursor:"pointer",color:aba===a.id?T.roseDark:T.mid,fontWeight:aba===a.id?800:600,fontSize:12,borderBottom:`3px solid ${aba===a.id?T.rose:"transparent"}`,whiteSpace:"nowrap"}}>{a.l}</button>)}
        </div>
      </div>
      <div style={{maxWidth:900,margin:"0 auto",padding:"20px 16px 60px"}}>
        {msg.m&&<div style={{background:msg.t==="ok"?T.mintLight:T.redLight,color:msg.t==="ok"?T.mintDark:T.red,borderRadius:10,padding:"11px 14px",marginBottom:16,fontSize:13,fontWeight:600}}>{msg.t==="ok"?"✓ ":"⚠️ "}{msg.m}</div>}

        {aba==="users"&&(
          <div>
            <div style={{color:T.text,fontSize:17,fontWeight:900,marginBottom:14}}>👥 Usuários ({users.length})</div>
            {users.map(u=>(
              <div key={u.id} style={{background:T.card,borderRadius:14,padding:"14px 16px",border:`1.5px solid ${u.bloqueado?T.red:T.border}`,marginBottom:10,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:3}}>
                    <span style={{color:T.text,fontSize:14,fontWeight:700}}>{u.nome||"(sem nome)"}</span>
                    <span style={{background:u.role==="admin"?T.lavLight:T.mintLight,color:u.role==="admin"?T.lavDark:T.mintDark,fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:99}}>{u.role==="admin"?"🛡️ Admin":"👤 Usuário"}</span>
                    {u.bloqueado&&<span style={{background:T.redLight,color:T.red,fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:99}}>🔒 Bloqueado</span>}
                    {u.id===user?.uid&&<span style={{background:T.butLight,color:"#B8860B",fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:99}}>Você</span>}
                  </div>
                  <div style={{color:T.muted,fontSize:12}}>{u.email}</div>
                  <div style={{color:T.muted,fontSize:11,marginTop:2}}>Criado: {u.criadoEm?.toDate?u.criadoEm.toDate().toLocaleDateString("pt-BR"):"—"}</div>
                </div>
                {u.id!==user?.uid&&(
                  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                    <select value={u.role} onChange={e=>mudarRole(u.id,e.target.value)} style={{background:T.lavLight,color:T.lavDark,border:"none",borderRadius:8,padding:"6px 8px",fontSize:11,fontWeight:700,cursor:"pointer"}}>
                      <option value="user">👤 Usuário</option><option value="admin">🛡️ Admin</option>
                    </select>
                    <button onClick={()=>bloquear(u.id,u.bloqueado)} style={{background:u.bloqueado?T.mintLight:T.redLight,color:u.bloqueado?T.mintDark:T.red,border:"none",borderRadius:8,padding:"6px 8px",fontSize:11,fontWeight:700,cursor:"pointer"}}>{u.bloqueado?"🔓":"🔒"}</button>
                    <button onClick={()=>remover(u.id,u.email)} style={{background:T.redLight,color:T.red,border:"none",borderRadius:8,padding:"6px 8px",fontSize:11,fontWeight:700,cursor:"pointer"}}>🗑️</button>
                  </div>
                )}
              </div>
            ))}
            {!users.length&&<div style={{color:T.muted,textAlign:"center",padding:"32px 0"}}>Nenhum usuário cadastrado.</div>}
          </div>
        )}

        {aba==="novo"&&(
          <div style={{maxWidth:440}}>
            <div style={{color:T.text,fontSize:17,fontWeight:900,marginBottom:16}}>➕ Criar novo usuário</div>
            <form onSubmit={criarUser} style={{background:T.card,borderRadius:18,padding:22,border:`1.5px solid ${T.border}`,display:"flex",flexDirection:"column",gap:13}}>
              <Campo label="Nome completo" val={nNome} set={setNNome} ph="Nome" T={T}/>

              <Campo label="Senha *" val={nSenha} set={v=>{setNSenha(v);setPErros(pwCheck(v));}} type="password" ph="Mínimo 8 caracteres" T={T}/>
              {pErros.length>0&&<div style={{background:T.redLight,borderRadius:10,padding:"10px 12px"}}>{pErros.map((e,i)=><div key={i} style={{color:T.red,fontSize:12}}>• {e}</div>)}</div>}
              <div>
                <label style={{color:T.mid,fontSize:12,fontWeight:700,display:"block",marginBottom:5}}>Papel</label>
                <select value={nRole} onChange={e=>setNRole(e.target.value)} style={{width:"100%",background:T.bgAlt,border:`1.5px solid ${T.border}`,borderRadius:10,padding:"9px 12px",color:T.text,fontSize:13}}>
                  <option value="user">👤 Usuário</option><option value="admin">🛡️ Administrador</option>

const SenhaForm=({user,T,onOk,onErr})=>{
  const[atual,setAtual]=useState("");const[nova,setNova]=useState("");const[erros,setErros]=useState([]);const[load,setLoad]=useState(false);
  const salvar=async e=>{
    e.preventDefault();const ev=pwCheck(nova);setErros(ev);if(ev.length)return;
    setLoad(true);
    try{const c=firebase.auth.EmailAuthProvider.credential(user.email,atual);await user.reauthenticateWithCredential(c);await user.updatePassword(nova);await auditLog(user.uid,"SENHA",{});onOk();setAtual("");setNova("");setErros([]);}
    catch(e){onErr("Senha atual incorreta.");}finally{setLoad(false);}
  };
  return(
    <form onSubmit={salvar} style={{background:T.card,borderRadius:18,padding:22,border:`1.5px solid ${T.border}`,display:"flex",flexDirection:"column",gap:13}}>
      <Campo label="Senha atual *" val={atual} set={setAtual} type="password" ph="Senha atual" T={T}/>
      <Campo label="Nova senha *" val={nova} set={v=>{setNova(v);setErros(pwCheck(v));}} type="password" ph="Nova senha forte" T={T}/>
      {erros.length>0&&<div style={{background:T.redLight,borderRadius:10,padding:"10px 12px"}}>{erros.map((e,i)=><div key={i} style={{color:T.red,fontSize:12}}>• {e}</div>)}</div>}
      <button type="submit" disabled={load} style={{background:load?T.border:`linear-gradient(135deg,${T.rose},${T.roseDark})`,color:"#fff",border:"none",borderRadius:12,padding:"13px 0",fontWeight:800,fontSize:14,cursor:load?"not-allowed":"pointer"}}>{load?"⏳...":"🔑 Alterar"}</button>
    </form>
  );
};

          </div>
        )}

        {aba==="diario"&&(
          <div>
            <div style={{background:T.card,borderRadius:14,padding:14,marginBottom:18,border:`1.5px solid ${T.border}`}}>
              <div style={{color:T.text,fontSize:13,fontWeight:800,marginBottom:8}}>✍️ Nova entrada</div>
              <textarea value={texto} onChange={e=>setTexto(e.target.value)} placeholder="O que está sentindo sobre este livro?" rows={3}

                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <Estrelas val={nota} set={setNota} tam={16}/>
                  <Btn ch="Salvar ✓" onClick={addEntrada} sm dis={!texto.trim()} T={T}/>
                </div>

              :<div style={{display:"flex",flexDirection:"column",gap:10}}>
                {[...entradas].reverse().map(e=>(
                  <div key={e.id} style={{background:T.card,borderRadius:12,padding:"12px 14px",border:`1.5px solid ${T.border}`}}>

                      <span style={{fontSize:18}}>{e.humor}</span>

                      {e.nota>0&&<Estrelas val={e.nota} ro tam={11}/>}
                      <button onClick={()=>setEntradas(p=>p.filter(x=>x.id!==e.id))} style={{marginLeft:"auto",background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:14}}>✕</button>
                    </div>
                    <div style={{color:T.text,fontSize:13,lineHeight:1.6}}>{e.texto}</div>
                  </div>
                ))}
              </div>
            }
          </div>
        )}

        {aba==="simil"&&(
          <div>
            {loadS&&<div style={{textAlign:"center",padding:"20px 0"}}><div className="spin" style={{width:28,height:28,border:`2px solid ${T.lav}`,borderTopColor:"transparent",borderRadius:"50%",margin:"0 auto 8px"}}/><div style={{color:T.muted,fontSize:12}}>Buscando similares...</div></div>}
            {!loadS&&simil.length>0&&(
              <div>
                <div style={{color:T.mid,fontSize:11,fontWeight:700,marginBottom:12}}>📚 {simil.length} livros similares</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:12}}>
                  {simil.map((r,i)=><SimilCard key={i} r={r} onAdd={onAddLivro} T={T}/>)}
                </div>
              </div>
            )}
          </div>
        )}

        {aba==="dl"&&(
          <div>
            <div style={{color:T.text,fontSize:15,fontWeight:800,marginBottom:4}}>⬇️ Download gratuito</div>
            <div style={{color:T.muted,fontSize:13,marginBottom:16}}>Busca em Archive.org e Project Gutenberg</div>
            {!dl&&<Btn ch={dlLoad?"⏳ Buscando...":"🔍 Buscar download"} onClick={async()=>{setDlLoad(true);const r=await buscarDownload(livro);setDl(r);setDlLoad(false);}} dis={dlLoad} T={T}/>}
            {dl&&(dl.ok?(
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                <div style={{color:T.lavDark,fontSize:13,fontWeight:800,marginBottom:4}}>✅ Encontrado em: {dl.fonte}</div>
                <a href={dl.ler} target="_blank" rel="noopener noreferrer" style={{background:T.card,color:T.text,border:`1px solid ${T.border}`,borderRadius:10,padding:"12px 16px",textDecoration:"none",display:"flex",alignItems:"center",gap:8,fontSize:13,fontWeight:700}}>📖 Ler online</a>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {dl.epub&&<a href={dl.epub} target="_blank" rel="noopener noreferrer" style={{flex:1,background:T.mintLight,color:T.mintDark,border:`1px solid ${T.mint}`,borderRadius:10,padding:"10px 0",textDecoration:"none",textAlign:"center",fontSize:12,fontWeight:800}}>📱 EPUB</a>}
                  {dl.pdf&&<a href={dl.pdf} target="_blank" rel="noopener noreferrer" style={{flex:1,background:T.roseLight,color:T.roseDark,border:`1px solid ${T.rose}`,borderRadius:10,padding:"10px 0",textDecoration:"none",textAlign:"center",fontSize:12,fontWeight:800}}>📄 PDF</a>}
                  {dl.txt&&<a href={dl.txt} target="_blank" rel="noopener noreferrer" style={{flex:1,background:T.butLight,color:"#B8860B",border:`1px solid ${T.butter||"#FFE082"}`,borderRadius:10,padding:"10px 0",textDecoration:"none",textAlign:"center",fontSize:12,fontWeight:800}}>📝 TXT</a>}
                </div>
                <div style={{color:T.muted,fontSize:11,textAlign:"center"}}>⚠️ Sujeito a direitos autorais</div>
              </div>
            ):(
              <div style={{textAlign:"center",padding:"20px 0"}}>
                <div style={{fontSize:34,marginBottom:8}}>😔</div>
                <div style={{color:T.text,fontSize:14,fontWeight:700,marginBottom:4}}>Download não disponível</div>
                <div style={{color:T.muted,fontSize:12}}>Este livro tem direitos autorais e não possui versão gratuita legal.</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

const Descobrir=({onAdd,jaTemTitulos,T})=>{
  const[q,setQ]=useState("");const[filtro,setFiltro]=useState("titulo");
  const[res,setRes]=useState([]);const[load,setLoad]=useState(false);const[buscou,setBuscou]=useState(false);
  const buscar=async()=>{
    if(!q.trim())return;setLoad(true);setBuscou(true);setRes([]);
    let sq=q;
    if(filtro==="autor")sq=`inauthor:${q}`;
    else if(filtro==="genero")sq=`subject:${q}`;
    setRes(await buscarLivros(sq));setLoad(false);
  };
  const FILTROS=[{id:"titulo",l:"📖 Título"},{id:"autor",l:"✍️ Autor"},{id:"genero",l:"🏷️ Gênero"}];
  const SUGEST=["Dark Romance","Thamy Bastida","Dom Casmurro","Harry Potter","Bela Kelly","Bruna Rodrigues","Paranormal","Máfia Romance"];

  return(
    <div>
      <div style={{textAlign:"center",marginBottom:18}}>
        <div style={{fontSize:28,marginBottom:4}}>🌎</div>
        <div style={{color:T.text,fontSize:17,fontWeight:900,marginBottom:3}}>Descobrir Livros</div>
        <div style={{color:T.muted,fontSize:12}}>Open Library + Google Books · Download · Adiciona à biblioteca</div>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",justifyContent:"center"}}>
        {FILTROS.map(f=><button key={f.id} onClick={()=>setFiltro(f.id)} style={{background:filtro===f.id?`linear-gradient(135deg,${T.rose},${T.roseDark})`:T.bgAlt,color:filtro===f.id?"#fff":T.mid,border:`1.5px solid ${filtro===f.id?T.rose:T.border}`,borderRadius:20,padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all .2s"}}>{f.l}</button>)}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:12}}>
        <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&buscar()} placeholder={`Buscar por ${FILTROS.find(f=>f.id===filtro)?.l||"título"}...`}
          style={{flex:1,background:T.card,border:`2px solid ${T.rose}`,borderRadius:14,padding:"12px 16px",color:T.text,fontSize:14,outline:"none",boxSizing:"border-box"}}/>
        <button onClick={buscar} disabled={load} style={{background:load?T.border:`linear-gradient(135deg,${T.rose},${T.roseDark})`,color:"#fff",border:"none",borderRadius:14,padding:"0 20px",fontWeight:800,fontSize:14,cursor:load?"not-allowed":"pointer",whiteSpace:"nowrap"}}>
          {load?"⏳":"🔍"}
        </button>
      </div>
      {!buscou&&<div style={{textAlign:"center",marginBottom:16}}><div style={{color:T.muted,fontSize:11,marginBottom:8,fontWeight:700}}>💡 Sugestões:</div><div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>{SUGEST.map(s=><span key={s} onClick={()=>{setQ(s);}} style={{background:T.lavLight,color:T.lavDark,fontSize:11,fontWeight:700,padding:"5px 12px",borderRadius:99,cursor:"pointer"}}>{s}</span>)}</div></div>}
      {load&&<div style={{textAlign:"center",padding:"40px 0"}}><div className="spin" style={{width:40,height:40,border:`4px solid ${T.rose}`,borderTopColor:"transparent",borderRadius:"50%",margin:"0 auto 12px"}}/><div style={{color:T.text,fontSize:14,fontWeight:700}}>Buscando...</div></div>}
      {!load&&buscou&&!res.length&&<div style={{textAlign:"center",padding:"36px 0"}}><div style={{fontSize:44,marginBottom:10}}>🔍</div><div style={{color:T.text,fontSize:15,fontWeight:800}}>Nenhum livro encontrado</div></div>}
      {!load&&res.length>0&&(
        <div>
          <div style={{color:T.muted,fontSize:11,marginBottom:12,textAlign:"center"}}>{res.length} livros — toque em <b>+ Biblioteca</b> para salvar</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(165px,1fr))",gap:12}}>
            {res.map((r,i)=><CardResultado key={r.id||i} r={r} adicionado={jaTemTitulos.has(r.titulo.toLowerCase())} onAdd={onAdd} T={T}/>)}
          </div>
        </div>
      )}
    </div>
  );
};

const CardResultado=({r,adicionado,onAdd,T})=>{
  const[imgSt,setImgSt]=useState("load");const[src,setSrc]=useState(null);const[srcI,setSrcI]=useState(0);
  const[dlLoad,setDlLoad]=useState(false);const[dl,setDl]=useState(null);const[showDl,setShowDl]=useState(false);
  const srcs=(()=>{const s=[];if(r.capa)s.push(r.capa);if(r.fonte==="GB"&&r.capa){s.push(r.capa.replace(/zoom=\d/,"zoom=1"));s.push(r.capa.replace(/zoom=\d/,"zoom=0"));}if(r.fonte==="OL"&&r.capa){s.push(r.capa.replace("-L.jpg","-M.jpg"));}return s.filter(Boolean);})();
  useEffect(()=>{if(!srcs.length){setImgSt("err");return;}setSrc(srcs[0]);setImgSt("load");setSrcI(0);},[r.id]);
  const onErr=()=>{const n=srcI+1;if(n<srcs.length){setSrcI(n);setSrc(srcs[n]);}else setImgSt("err");};
  const baixar=async e=>{e.stopPropagation();setDlLoad(true);setShowDl(true);setDl(await buscarDownload(r));setDlLoad(false);};
  const bB={border:"none",borderRadius:9,fontSize:11,fontWeight:800,cursor:"pointer",textDecoration:"none",textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center",gap:4};
  return(
    <div style={{background:T.card,borderRadius:14,overflow:"hidden",border:`1.5px solid ${T.border}`,display:"flex",flexDirection:"column",transition:"all .2s"}}
      onMouseEnter={e=>{e.currentTarget.style.borderColor=T.rose;e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow=`0 6px 20px ${T.rose}20`;}}
      onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
      <div style={{position:"relative",paddingBottom:"145%",background:T.roseLight,flexShrink:0}}>
        {imgSt!=="err"&&src&&<img src={src} alt={r.titulo} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",display:imgSt==="load"?"none":"block"}} onLoad={()=>setImgSt("ok")} onError={onErr}/>}
        {imgSt==="load"&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><div className="spin" style={{width:24,height:24,border:`2px solid ${T.rose}`,borderTopColor:"transparent",borderRadius:"50%"}}/></div>}
        {imgSt==="err"&&<div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:`linear-gradient(135deg,${T.roseLight},${T.lavLight})`}}><span style={{fontSize:36}}>📚</span></div>}
        <div style={{position:"absolute",top:6,right:6,background:r.fonte==="OL"?T.mintLight:T.lavLight,borderRadius:6,padding:"2px 6px"}}><span style={{color:r.fonte==="OL"?T.mintDark:T.lavDark,fontSize:8,fontWeight:800}}>{r.fonte}</span></div>
      </div>
      <div style={{padding:"10px 12px",flex:1,display:"flex",flexDirection:"column"}}>
        <div style={{color:T.text,fontSize:12,fontWeight:800,marginBottom:2,lineHeight:1.3,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{r.titulo}</div>
        <div style={{color:T.mid,fontSize:10,marginBottom:5}}>{r.autor}</div>
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
          {r.ano&&<span style={{background:T.butLight,color:"#B8860B",fontSize:8,fontWeight:700,padding:"2px 5px",borderRadius:5}}>📅 {r.ano}</span>}
          {r.paginas>0&&<span style={{background:T.skyLight,color:"#1565C0",fontSize:8,fontWeight:700,padding:"2px 5px",borderRadius:5}}>📄 {r.paginas}p</span>}
        </div>
        {r.sinopse&&<div style={{color:T.muted,fontSize:10,lineHeight:1.5,marginBottom:8,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",flex:1}}>{r.sinopse.slice(0,100)}...</div>}
        <div style={{display:"flex",gap:4,marginTop:"auto",paddingTop:6}}>
          {r.previa&&<a href={r.previa} target="_blank" rel="noopener noreferrer" style={{...bB,flex:"0 0 auto",background:T.skyLight,color:"#1976D2",padding:"6px 8px"}}>👁️</a>}
          <button onClick={baixar} style={{...bB,flex:1,background:`linear-gradient(135deg,${T.lav},${T.lavDark})`,color:"#fff",padding:"6px 0"}}>{dlLoad?"⏳":"⬇️"}</button>
          <button onClick={()=>!adicionado&&onAdd(r)} disabled={adicionado} style={{...bB,flex:1,background:adicionado?T.mintLight:`linear-gradient(135deg,${T.rose},${T.roseDark})`,color:adicionado?T.mintDark:"#fff",padding:"6px 0",cursor:adicionado?"default":"pointer"}}>
            {adicionado?"✓":"+ Salvar"}
          </button>
        </div>
        {showDl&&(
          <div style={{marginTop:8,background:T.lavLight,borderRadius:10,padding:"10px 12px",border:`1.5px solid ${T.lav}`,position:"relative"}}>
            <button onClick={()=>setShowDl(false)} style={{position:"absolute",top:5,right:7,background:"none",border:"none",cursor:"pointer",color:T.muted,fontSize:13}}>✕</button>
            {dlLoad&&<div style={{textAlign:"center",padding:"6px 0"}}><div className="spin" style={{width:18,height:18,border:`2px solid ${T.lavDark}`,borderTopColor:"transparent",borderRadius:"50%",margin:"0 auto 4px"}}/><span style={{color:T.muted,fontSize:11}}>Buscando...</span></div>}
            {!dlLoad&&dl&&(dl.ok?(
              <>
                <div style={{color:T.lavDark,fontSize:11,fontWeight:800,marginBottom:6}}>✅ {dl.fonte}</div>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  <a href={dl.ler} target="_blank" rel="noopener noreferrer" style={{...bB,background:T.card,color:T.text,border:`1px solid ${T.border}`,padding:"7px",borderRadius:8,fontSize:11}}>📖 Ler online</a>
                  <div style={{display:"flex",gap:4}}>
                    {dl.epub&&<a href={dl.epub} target="_blank" rel="noopener noreferrer" style={{...bB,flex:1,background:T.mintLight,color:T.mintDark,border:`1px solid ${T.mint}`,padding:"6px 0",borderRadius:7,fontSize:10}}>📱 EPUB</a>}
                    {dl.pdf&&<a href={dl.pdf} target="_blank" rel="noopener noreferrer" style={{...bB,flex:1,background:T.roseLight,color:T.roseDark,border:`1px solid ${T.rose}`,padding:"6px 0",borderRadius:7,fontSize:10}}>📄 PDF</a>}
                    {dl.txt&&<a href={dl.txt} target="_blank" rel="noopener noreferrer" style={{...bB,flex:1,background:T.butLight,color:"#B8860B",border:`1px solid #FFE082`,padding:"6px 0",borderRadius:7,fontSize:10}}>📝 TXT</a>}
                  </div>
                </div>
              </>
            ):(
              <div style={{textAlign:"center",padding:"4px 0"}}>
                <div style={{fontSize:20,marginBottom:4}}>😔</div>
                <div style={{color:T.text,fontSize:11,fontWeight:700}}>Sem download gratuito</div>
                <div style={{color:T.muted,fontSize:10,marginTop:2}}>Livro com direitos autorais.</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

// MELHORES DO MÊS
// ══════════════════════════════════════════
const MelhoresDoMes=({livros,T})=>{
  const[mesSel,setMesSel]=useState(`${ANO}-${String(new Date().getMonth()+1).padStart(2,"0")}`);
  const mesesDisponiveis=useMemo(()=>{
    const s=new Set();
    livros.filter(b=>b.status==="lido"&&b.finalizadoEm).forEach(b=>s.add(b.finalizadoEm.slice(0,7)));
    return [...s].sort().reverse();
  },[livros]);

  const livrosMes=useMemo(()=>{
    return livros
      .filter(b=>b.status==="lido"&&b.finalizadoEm?.startsWith(mesSel)&&b.nota>0)
      .sort((a,b)=>b.nota-a.nota);
  },[livros,mesSel]);

  const MEDALHAS=["🥇","🥈","🥉"];
  const mesLabel=mesSel?`${MESES[parseInt(mesSel.slice(5,7))-1]} ${mesSel.slice(0,4)}`:"";

  return(
    <div style={{paddingBottom:32}}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:32,marginBottom:4}}>🏆</div>
        <div style={{color:T.text,fontSize:18,fontWeight:900,marginBottom:4}}>Melhores do Mês</div>
        <div style={{color:T.muted,fontSize:13}}>Seus livros favoritos de cada período</div>
      </div>

      {/* Seletor de mês */}
      <div style={{display:"flex",gap:8,overflowX:"auto",scrollbarWidth:"none",marginBottom:24,paddingBottom:4}}>
        {mesesDisponiveis.length===0&&<div style={{color:T.muted,fontSize:12,textAlign:"center",width:"100%"}}>Nenhum livro lido ainda neste período</div>}
        {mesesDisponiveis.map(m=>(
          <button key={m} onClick={()=>setMesSel(m)} style={{flexShrink:0,background:mesSel===m?`linear-gradient(135deg,${T.rose},${T.roseDark})`:T.card,color:mesSel===m?"#fff":T.mid,border:`1.5px solid ${mesSel===m?T.rose:T.border}`,borderRadius:20,padding:"7px 16px",fontSize:12,fontWeight:700,cursor:"pointer",transition:"all .2s",whiteSpace:"nowrap"}}>
            {MESES[parseInt(m.slice(5,7))-1]} {m.slice(0,4)}
          </button>
        ))}
      </div>

      {livrosMes.length===0?(
        <div style={{textAlign:"center",padding:"40px 0"}}>
          <div style={{fontSize:44,marginBottom:10}}>📚</div>
          <div style={{color:T.text,fontSize:15,fontWeight:700,marginBottom:4}}>Nenhum livro avaliado em {mesLabel}</div>
          <div style={{color:T.muted,fontSize:12}}>Adicione notas aos livros que leu neste mês</div>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:16}}>
          {livrosMes.slice(0,3).map((b,i)=>(
            <div key={b.id} style={{background:T.card,borderRadius:20,padding:18,border:`2px solid ${i===0?T.star:i===1?"#C0C0C0":i===2?"#CD7F32":T.border}`,boxShadow:i===0?`0 8px 28px ${T.star}30`:"none"}}>
              <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
                <div style={{fontSize:36,flexShrink:0,lineHeight:1}}>{MEDALHAS[i]||"🏅"}</div>
                <div style={{width:72,height:107,borderRadius:10,overflow:"hidden",flexShrink:0,boxShadow:"0 4px 12px rgba(0,0,0,.2)"}}>
                  <Capa livro={b} w="72px" h="107px" r={10} T={T}/>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{color:T.text,fontSize:15,fontWeight:900,lineHeight:1.25,marginBottom:3}}>{b.titulo}</div>
                  <div style={{color:T.mid,fontSize:12,marginBottom:6}}>✍️ {b.autor}</div>
                  <Estrelas val={b.nota} ro tam={18}/>
                  <div style={{display:"flex",gap:10,marginTop:8,flexWrap:"wrap"}}>

const Retrospectiva=({livros,T})=>{
  const lidos=livros.filter(b=>b.status==="lido"&&b.finalizadoEm?.startsWith(String(ANO)));
  const totalPags=lidos.reduce((s,b)=>s+(b.paginas||0),0);
  const avg=lidos.filter(b=>b.nota>0).reduce((s,b,_,a)=>s+b.nota/a.length,0);
  const tempoEst=Math.round(totalPags*2/60);
  const generoCount={};lidos.forEach(b=>(b.genero||[]).forEach(g=>{generoCount[g]=(generoCount[g]||0)+1;}));
  const topGenero=Object.entries(generoCount).sort((a,b)=>b[1]-a[1])[0];
  const autorCount={};lidos.forEach(b=>{if(b.autor)autorCount[b.autor]=(autorCount[b.autor]||0)+1;});
  const topAutor=Object.entries(autorCount).sort((a,b)=>b[1]-a[1])[0];
  const maisPags=lidos.sort((a,b)=>(b.paginas||0)-(a.paginas||0))[0];
  const melhorNota=lidos.filter(b=>b.nota>0).sort((a,b)=>b.nota-a.nota)[0];
  const piorNota=lidos.filter(b=>b.nota>0).sort((a,b)=>a.nota-b.nota)[0];

  const ITEMS=[
    {ico:"📚",label:"Livros lidos",val:lidos.length,cor:T.lavDark},
    {ico:"📄",label:"Páginas lidas",val:totalPags.toLocaleString("pt-BR"),cor:T.roseDark},
    {ico:"⏱️",label:"Tempo estimado",val:`~${tempoEst}h`,cor:T.mintDark},
    {ico:"⭐",label:"Média de avaliações",val:avg?avg.toFixed(1)+"★":"—",cor:T.star},
    {ico:"❤️",label:"Livro favorito",val:melhorNota?.titulo||"—",cor:T.red,small:true},
    {ico:"📈",label:"Gênero mais lido",val:topGenero?`${topGenero[0]} (${topGenero[1]}x)`:"—",cor:T.lavDark,small:true},
    {ico:"✍️",label:"Autor mais lido",val:topAutor?`${topAutor[0]} (${topAutor[1]}x)`:"—",cor:T.mid,small:true},
    {ico:"📖",label:"Livro mais longo",val:maisPags?`${maisPags.titulo} (${maisPags.paginas}p)`:"—",cor:T.sky,small:true},
    {ico:"👎",label:"Maior decepção",val:piorNota?.titulo||"—",cor:T.muted,small:true},
  ];

  return(
    <div style={{paddingBottom:32}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:32,marginBottom:4}}>🎬</div>

          <div style={{fontSize:44,marginBottom:10}}>📚</div>
          <div style={{color:T.text,fontSize:15,fontWeight:700}}>Complete leituras para ver sua retrospectiva!</div>
        </div>
      ):(
        <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}}>
          {ITEMS.map((s,i)=>(
            <div key={i} style={{background:T.card,borderRadius:16,padding:"16px 14px",border:`1.5px solid ${T.border}`,textAlign:"center"}}>

// CALENDÁRIO DE LEITURA
// ══════════════════════════════════════════
const Calendario=({livros,T})=>{
  const hoje=new Date();
  const[ano,setAno]=useState(hoje.getFullYear());
  const[mes,setMes]=useState(hoje.getMonth());

  const diasComLeitura=useMemo(()=>{
    const s=new Set();
    livros.forEach(b=>(b.entradas||[]).forEach(e=>{if(e.data)s.add(e.data);}));
    livros.filter(b=>b.finalizadoEm).forEach(b=>s.add(b.finalizadoEm));
    return s;
  },[livros]);

  const primeiroDia=new Date(ano,mes,1).getDay();
  const diasNoMes=new Date(ano,mes+1,0).getDate();
  const diasComLeituraMes=[...diasComLeitura].filter(d=>d.startsWith(`${ano}-${String(mes+1).padStart(2,"0")}`));
  const diasLidosMes=diasComLeituraMes.length;

  const prev=()=>{if(mes===0){setMes(11);setAno(a=>a-1);}else setMes(m=>m-1);};
  const next=()=>{if(mes===11){setMes(0);setAno(a=>a+1);}else setMes(m=>m+1);};

  return(
    <div style={{paddingBottom:32}}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:28,marginBottom:4}}>📅</div>
        <div style={{color:T.text,fontSize:18,fontWeight:900,marginBottom:4}}>Calendário de Leitura</div>
        <div style={{color:T.muted,fontSize:13}}>Dias em que você leu</div>
      </div>

      {/* Navegação */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <button onClick={prev} style={{background:T.card,border:`1.5px solid ${T.border}`,borderRadius:12,padding:"8px 16px",color:T.text,fontWeight:700,fontSize:14,cursor:"pointer"}}>←</button>
        <div style={{color:T.text,fontSize:16,fontWeight:900}}>{MESES[mes]} {ano}</div>
        <button onClick={next} style={{background:T.card,border:`1.5px solid ${T.border}`,borderRadius:12,padding:"8px 16px",color:T.text,fontWeight:700,fontSize:14,cursor:"pointer"}}>→</button>
      </div>

      {/* Dias da semana */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
        {["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"].map(d=>(
          <div key={d} style={{textAlign:"center",color:T.muted,fontSize:10,fontWeight:700,padding:"4px 0"}}>{d}</div>
        ))}
      </div>

      {/* Grade de dias */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:20}}>
        {Array.from({length:primeiroDia}).map((_,i)=><div key={`e${i}`}/>)}
        {Array.from({length:diasNoMes}).map((_,i)=>{
          const dia=i+1;
          const dataStr=`${ano}-${String(mes+1).padStart(2,"0")}-${String(dia).padStart(2,"0")}`;
          const leu=diasComLeitura.has(dataStr);
          const eHoje=dataStr===HOJE;
          return(

const Metas=({livros,metas,setMetas,T})=>{
  const lidos=livros.filter(b=>b.status==="lido");
  const anoAtual=lidos.filter(b=>b.finalizadoEm?.startsWith(String(ANO)));
  const now=new Date();
  const mesAtual=lidos.filter(b=>{const d=new Date(b.finalizadoEm||"");return d.getFullYear()===ANO&&d.getMonth()===now.getMonth();});
  const ini=new Date();ini.setDate(ini.getDate()-ini.getDay());
  const semAtual=lidos.filter(b=>{const d=new Date(b.finalizadoEm||"");return d>=ini;});
  const totalPags=lidos.reduce((s,b)=>s+(b.paginas||0),0);

  const MB=({ico,label,atual,meta,cor,onMeta})=>{
    const[edit,setEdit]=useState(false);const[v,setV]=useState(String(meta));
    const pct=Math.min(100,Math.round((atual/Math.max(meta,1))*100));
    return(
      <div style={{background:T.card,borderRadius:16,padding:"18px 20px",border:`1.5px solid ${T.border}`,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:22}}>{ico}</span><span style={{color:T.text,fontSize:14,fontWeight:800}}>{label}</span></div>
          {edit?(
            <div style={{display:"flex",gap:6,alignItems:"center"}}>
              <input type="number" value={v} onChange={e=>setV(e.target.value)} style={{width:70,background:T.bgAlt,border:`1.5px solid ${T.border}`,borderRadius:8,padding:"4px 8px",color:T.text,fontSize:13,outline:"none"}}/>
              <button onClick={()=>{onMeta(Number(v)||meta);setEdit(false);}} style={{background:T.mintLight,border:"none",borderRadius:8,padding:"4px 10px",color:T.mintDark,fontWeight:700,fontSize:12,cursor:"pointer"}}>OK</button>
            </div>
          ):(
            <button onClick={()=>setEdit(true)} style={{background:T.lavLight,border:"none",borderRadius:8,padding:"4px 10px",color:T.lavDark,fontWeight:700,fontSize:11,cursor:"pointer"}}>✏️ Meta: {meta}</button>
          )}
        </div>
        <Barra val={pct} cor={cor} h={12} T={T}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
          <span style={{color:cor,fontWeight:900,fontSize:18}}>{atual}/{meta}</span>
          <span style={{color:T.muted,fontSize:12,alignSelf:"flex-end"}}>{pct}% · {Math.max(0,meta-atual)} restantes</span>
        </div>
      </div>
    );
  };

  return(
    <div style={{paddingBottom:32}}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:28,marginBottom:4}}>🎯</div>
        <div style={{color:T.text,fontSize:18,fontWeight:900,marginBottom:4}}>Metas de Leitura</div>
        <div style={{color:T.muted,fontSize:13}}>Toque em "Meta" para editar</div>
      </div>
      <MB ico="📅" label={`Meta anual ${ANO}`} atual={anoAtual.length} meta={metas.anual} cor={T.roseDark} onMeta={v=>setMetas(m=>({...m,anual:v}))}/>
      <MB ico="🗓️" label="Meta mensal" atual={mesAtual.length} meta={metas.mensal} cor={T.lavDark} onMeta={v=>setMetas(m=>({...m,mensal:v}))}/>
      <MB ico="📆" label="Meta semanal" atual={semAtual.length} meta={metas.semanal} cor={T.mintDark} onMeta={v=>setMetas(m=>({...m,semanal:v}))}/>
      <MB ico="📄" label="Meta de páginas" atual={totalPags} meta={metas.paginas} cor="#B8860B" onMeta={v=>setMetas(m=>({...m,paginas:v}))}/>
    </div>
  );
};

const TelaDiario=({user,perfil,sair,T,darkMode,setDarkMode})=>{
  const[livros,setLivros]=useState([]);

  const[hist,setHist]=useState([{view:"home",p:{}}]);
  const atual=hist[hist.length-1];const{view,p}=atual;const podeVoltar=hist.length>1;

  const[formLivro,setFormLivro]=useState(false);const[editLivro,setEditLivro]=useState(null);
  const[busca,setBusca]=useState("");const[filtStatus,setFiltStatus]=useState("todos");
  const[filtGenero,setFiltGenero]=useState("todos");const[filtAno,setFiltAno]=useState("todos");
  const[ordem,setOrdem]=useState("adicionadoEm");const[soFav,setSoFav]=useState(false);

  useEffect(()=>{
    if(!user?.uid)return;
    Promise.all([
      db.collection("users").doc(user.uid).collection("livros").get(),
      db.collection("users").doc(user.uid).collection("metas").doc("main").get()
    ]).then(([lS,mS])=>{
      setLivros(lS.docs.map(d=>d.data()));
      if(mS.exists)setMetas(mS.data());
      setCarregando(false);
    }).catch(()=>setCarregando(false));
  },[user?.uid]);

  useEffect(()=>{
    if(!user?.uid||carregando)return;
    db.collection("users").doc(user.uid).collection("metas").doc("main").set(metas);
  },[metas]);

  const nav=(v,params={})=>{setHist(h=>[...h,{view:v,params,p:params}]);window.scrollTo(0,0);};
  const voltar=useCallback(()=>{setHist(h=>h.length>1?h.slice(0,-1):h);window.scrollTo(0,0);},[]);
  const irAba=aba=>{setHist([{view:aba,p:{}}]);window.scrollTo(0,0);};

  useEffect(()=>{
    window.history.pushState(null,"",window.location.href);
    const fn=e=>{e.preventDefault();voltar();window.history.pushState(null,"",window.location.href);};
    window.addEventListener("popstate",fn);
    return()=>window.removeEventListener("popstate",fn);
  },[voltar]);

  const salvarLivro=async livro=>{
    const novo=livros.some(b=>b.id===livro.id)?livros.map(b=>b.id===livro.id?livro:b):[...livros,livro];
    setLivros(novo);
    await db.collection("users").doc(user.uid).collection("livros").doc(String(livro.id)).set(livro);

  };

  const toggleFav=async id=>{const novo=livros.map(b=>b.id===id?{...b,fav:!b.fav}:b);setLivros(novo);const livro=novo.find(b=>b.id===id);await db.collection("users").doc(user.uid).collection("livros").doc(String(id)).set(livro);};
  const addDoDescobrir=async r=>{
    if(livros.find(b=>b.titulo.toLowerCase()===r.titulo.toLowerCase())){alert("Já está na biblioteca!");return;}
    const nb={id:gid(),titulo:r.titulo,autor:r.autor,genero:r.genero?.slice(0,2)||[],serie:"",status:"quero ler",nota:0,progresso:0,capa:r.capa,paginas:r.paginas||0,ano:r.ano||"",adicionadoEm:HOJE,finalizadoEm:null,sinopse:r.sinopse||"",resenha:"",entradas:[],tags:[],fav:false};
    setLivros(l=>[...l,nb]);
    await db.collection("users").doc(user.uid).collection("livros").doc(String(nb.id)).set(nb);
  };

  const todosAnos=[...new Set(livros.map(b=>b.ano).filter(Boolean))].sort((a,b)=>b-a);

  const filtrados=livros.filter(b=>{
    const q=busca.toLowerCase();
    const ms=!q||b.titulo.toLowerCase().includes(q)||b.autor.toLowerCase().includes(q)||(b.genero||[]).some(g=>g.toLowerCase().includes(q))||(b.tags||[]).some(t=>t.toLowerCase().includes(q))||(b.serie||"").toLowerCase().includes(q)||(b.ano||"").includes(q);
    return ms&&(filtStatus==="todos"||b.status===filtStatus)&&(filtGenero==="todos"||(b.genero||[]).includes(filtGenero))&&(filtAno==="todos"||b.ano===filtAno)&&(!soFav||b.fav);
  }).sort((a,b)=>{
    if(ordem==="titulo")return a.titulo.localeCompare(b.titulo);
    if(ordem==="autor")return(a.autor||"").localeCompare(b.autor||"");
    if(ordem==="nota")return(b.nota||0)-(a.nota||0);
    if(ordem==="paginas")return(b.paginas||0)-(a.paginas||0);
    if(ordem==="ano")return(b.ano||"").localeCompare(a.ano||"");
    return(b.adicionadoEm||"").localeCompare(a.adicionadoEm||"");
  });

  const listaFiltrada=()=>livros.filter(b=>{
    if(p.status&&p.status!=="todos"&&b.status!==p.status)return false;
    if(p.genero&&!(b.genero||[]).includes(p.genero))return false;
    if(p.autor&&b.autor!==p.autor)return false;
    if(p.favoritos&&!b.fav)return false;
    return true;
  });

  const jaTemTitulos=new Set(livros.map(b=>b.titulo.toLowerCase()));

  const ABAS=[
    {id:"home",l:"🏠"},
    {id:"biblioteca",l:"📚"},
    {id:"descobrir",l:"🌎"},
    {id:"stats",l:"📊"},
    {id:"metas",l:"🎯"},
    {id:"mais",l:"✨"},
  ];

  const MAIS_ABAS=[
    {id:"conquistas",l:"🏅 Conquistas"},
    {id:"desafios",l:"🎯 Desafios"},
    {id:"melhores",l:"🏆 Melhores do Mês"},
    {id:"rankings",l:"🏆 Rankings"},
    {id:"livro-ano",l:"🏆 Livro do Ano"},
    {id:"retro",l:"🎬 Retrospectiva"},
    {id:"calendario",l:"📅 Calendário"},
  ];

  const abaAtiva=ABAS.find(a=>a.id===view)?.id||hist.find(h=>ABAS.some(a=>a.id===h.view))?.view||"home";

  if(carregando)return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:T.head,gap:16}}>
      <div style={{fontSize:52}}>📖</div>
      <div className="spin" style={{width:40,height:40,border:`4px solid ${T.rose}`,borderTopColor:"transparent",borderRadius:"50%"}}/>
      <div style={{color:T.mid,fontSize:14}}>Carregando sua biblioteca...</div>
    </div>
  );

  // Tela de detalhe — tela cheia
  if(view==="detalhe"&&p.livro){
    const livroAtual=livros.find(b=>b.id===p.livro.id)||p.livro;
    return(
      <div style={{minHeight:"100vh",background:T.bg}}>
        {formLivro&&<FormLivro livro={editLivro} onSalvar={salvarLivro} onFechar={()=>{setFormLivro(false);setEditLivro(null);}} T={T}/>}
        <div style={{background:T.head,padding:"10px 16px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:100,boxShadow:`0 2px 8px rgba(0,0,0,.1)`}}>
          <button onClick={voltar} style={{background:T.card,border:`1.5px solid ${T.border}`,borderRadius:12,width:38,height:38,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:T.text,fontSize:20,flexShrink:0}}>←</button>
          <div style={{color:T.text,fontSize:14,fontWeight:800,flex:1,overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>{livroAtual.titulo}</div>
          <button onClick={()=>{setEditLivro(null);setFormLivro(true);}} style={{background:`linear-gradient(135deg,${T.rose},${T.roseDark})`,color:"#fff",border:"none",borderRadius:12,padding:"7px 12px",fontWeight:800,fontSize:12,cursor:"pointer"}}>+ Livro</button>
        </div>
        <DetalheLivro livro={livroAtual} onEditar={b=>{setEditLivro(b);setFormLivro(true);}} onRemover={removerLivro} onAddLivro={r=>{addDoDescobrir(r);alert(`"${r.titulo}" adicionado! ✨`);}} T={T}/>
      </div>
    );
  }

  return(
    <div style={{minHeight:"100vh",background:T.bg}}>
      {formLivro&&<FormLivro livro={editLivro} onSalvar={salvarLivro} onFechar={()=>{setFormLivro(false);setEditLivro(null);}} T={T}/>}

      {/* HEADER */}
      <div style={{background:T.head,borderBottom:`1px solid ${T.border}`,position:"sticky",top:0,zIndex:100,boxShadow:`0 2px 8px rgba(0,0,0,.07)`}}>
        <div style={{maxWidth:1200,margin:"0 auto",padding:"0 12px"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,height:50}}>
            {podeVoltar
              ?<button onClick={voltar} style={{background:T.card,border:`1.5px solid ${T.border}`,borderRadius:12,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:T.text,fontSize:18,flexShrink:0}}>←</button>
              :<div style={{fontWeight:900,fontSize:15,color:T.text,flexShrink:0}}>📖</div>
            }
            {/* Abas navegação */}
            <div style={{flex:1,display:"flex",gap:2,overflowX:"auto",scrollbarWidth:"none"}}>
              {ABAS.map(a=>(
                <button key={a.id} onClick={()=>irAba(a.id)}
                  style={{background:abaAtiva===a.id?T.card:"transparent",border:`1.5px solid ${abaAtiva===a.id?T.rose:"transparent"}`,borderRadius:12,padding:"5px 12px",color:abaAtiva===a.id?T.roseDark:T.mid,fontWeight:abaAtiva===a.id?800:600,fontSize:13,cursor:"pointer",transition:"all .2s",whiteSpace:"nowrap",flexShrink:0}}>
                  {a.l}
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0}}>
              <button onClick={()=>setDarkMode(d=>!d)} style={{background:T.card,border:`1.5px solid ${T.border}`,borderRadius:10,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:15}} title={darkMode?"Claro":"Escuro"}>{darkMode?"🌞":"🌙"}</button>
              <button onClick={sair} style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:10,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:14,color:T.mid}} title="Sair">🚪</button>
              <button onClick={()=>{setEditLivro(null);setFormLivro(true);}} style={{background:`linear-gradient(135deg,${T.rose},${T.roseDark})`,color:"#fff",border:"none",borderRadius:12,padding:"7px 12px",fontWeight:800,fontSize:12,cursor:"pointer",whiteSpace:"nowrap"}}>+ Livro</button>
            </div>
          </div>
        </div>
      </div>

      {/* CONTEÚDO */}
      <div style={{maxWidth:1200,margin:"0 auto",padding:"18px 12px 60px"}}>

        {view==="home"&&<Dashboard livros={livros} metas={metas} navegar={(v,params)=>{if(ABAS.find(a=>a.id===v))irAba(v);else nav(v,params);}} T={T}/>}

        {view==="biblioteca"&&(
          <>
            <div style={{background:T.card,borderRadius:14,padding:"12px 14px",marginBottom:14,border:`1.5px solid ${T.border}`,display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
              <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="🔍 Título, autor, série, tag..."
                style={{flex:1,minWidth:140,background:T.bgAlt,border:`1.5px solid ${T.border}`,borderRadius:12,padding:"8px 12px",color:T.text,fontSize:13,outline:"none"}}/>
              <span onClick={()=>setSoFav(f=>!f)} style={{cursor:"pointer",fontSize:20,filter:soFav?"none":"grayscale(1) opacity(.35)",transition:"all .2s",userSelect:"none"}}>❤️</span>
              {[
                {val:filtStatus,set:setFiltStatus,opts:[{v:"todos",l:"Todos"},...STATUS_LIST.map(s=>({v:s,l:`${STATUS_CFG[s].icon} ${STATUS_CFG[s].label}`}))]},
                {val:filtGenero,set:setFiltGenero,opts:[{v:"todos",l:"Gênero"},...todosGeneros.map(g=>({v:g,l:g}))]},
                {val:filtAno,set:setFiltAno,opts:[{v:"todos",l:"Ano"},...todosAnos.map(a=>({v:a,l:a}))]},
                {val:ordem,set:setOrdem,opts:[{v:"adicionadoEm",l:"📅 Recentes"},{v:"titulo",l:"🔤 A–Z"},{v:"autor",l:"✍️ Autor"},{v:"nota",l:"⭐ Nota"},{v:"paginas",l:"📄 Páginas"},{v:"ano",l:"📅 Ano"}]},
              ].map((s,i)=>(
                <select key={i} value={s.val} onChange={e=>s.set(e.target.value)} style={{background:T.bgAlt,border:`1.5px solid ${T.border}`,borderRadius:12,padding:"8px 10px",color:T.text,fontSize:11,outline:"none"}}>
                  {s.opts.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
                </select>
              ))}
              <span style={{color:T.muted,fontSize:11,whiteSpace:"nowrap"}}>{filtrados.length}</span>
            </div>
            {!filtrados.length
              ?<div style={{textAlign:"center",padding:"50px 0"}}><div style={{fontSize:52,marginBottom:12}}>📚</div><div style={{color:T.text,fontSize:16,fontWeight:800,marginBottom:16}}>Nenhum livro encontrado</div><button onClick={()=>{setEditLivro(null);setFormLivro(true);}} style={{background:`linear-gradient(135deg,${T.rose},${T.roseDark})`,color:"#fff",border:"none",borderRadius:12,padding:"11px 22px",fontWeight:800,fontSize:14,cursor:"pointer"}}>+ Adicionar livro</button></div>
              :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(138px,1fr))",gap:12}}>
                {filtrados.map(b=><CardLivro key={b.id} livro={b} onClick={b=>nav("detalhe",{livro:b})} onFav={toggleFav} T={T}/>)}
              </div>
            }
          </>
        )}

        {view==="descobrir"&&<div style={{background:T.card,borderRadius:20,padding:"20px 16px",border:`1.5px solid ${T.border}`}}><Descobrir onAdd={addDoDescobrir} jaTemTitulos={jaTemTitulos} T={T}/></div>}
        {view==="stats"&&<Estatisticas livros={livros} navegar={nav} T={T}/>}
        {view==="metas"&&<Metas livros={livros} metas={metas} setMetas={setMetas} T={T}/>}

        {/* ✨ MAIS — menu de telas extras */}
        {view==="mais"&&(
          <div>
            <div style={{color:T.text,fontSize:17,fontWeight:900,marginBottom:16}}>✨ Explorar</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12}}>
              {MAIS_ABAS.map(a=>(
                <button key={a.id} onClick={()=>nav(a.id)} style={{background:T.card,border:`1.5px solid ${T.border}`,borderRadius:16,padding:"20px 14px",cursor:"pointer",textAlign:"center",transition:"all .2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=T.rose;e.currentTarget.style.transform="translateY(-3px)";e.currentTarget.style.boxShadow=`0 8px 20px ${T.rose}20`;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=T.border;e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
                  <div style={{fontSize:28,marginBottom:8}}>{a.l.slice(0,2)}</div>
                  <div style={{color:T.text,fontSize:13,fontWeight:700}}>{a.l.slice(3)}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        {view==="conquistas"&&<Conquistas livros={livros} T={T}/>}
        {view==="desafios"&&<Desafios livros={livros} T={T}/>}
        {view==="melhores"&&<MelhoresDoMes livros={livros} T={T}/>}
        {view==="rankings"&&<Rankings livros={livros} navegar={nav} T={T}/>}
        {view==="livro-ano"&&<LivroDoAno livros={livros} T={T}/>}
        {view==="retro"&&<Retrospectiva livros={livros} T={T}/>}
        {view==="calendario"&&<Calendario livros={livros} T={T}/>}

        {view==="lista"&&(
          <div>
            <div style={{color:T.muted,fontSize:12,marginBottom:12}}>{listaFiltrada().length} livro(s)</div>
            {!listaFiltrada().length
              ?<div style={{textAlign:"center",padding:"40px 0",color:T.muted}}><div style={{fontSize:44,marginBottom:10}}>📚</div>Nenhum livro nesta categoria</div>
              :<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(138px,1fr))",gap:12}}>
                {listaFiltrada().map(b=><CardLivro key={b.id} livro={b} onClick={b=>nav("detalhe",{livro:b})} onFav={toggleFav} T={T}/>)}
              </div>
            }
          </div>
        )}
      </div>
    </div>
  );
};

// ══════════════════════════════════════════
// APP RAIZ
// ══════════════════════════════════════════

// Emails que são sempre admin — mesmo sem documento no Firestore
const ADMIN_EMAILS = [
  "t.e.x.u.g.o@hotmail.com",
  "admin@diario.com",
];

function App(){
  const[fbUser,setFbUser]=useState(null);
  const[perfil,setPerfil]=useState(null);
  const[carregando,setCarregando]=useState(true);
  const[darkMode,setDarkMode]=useState(false);
  const T=darkMode?DARK:LIGHT;

  useEffect(()=>{
    const unsub=auth.onAuthStateChanged(async u=>{
      if(u){
        setFbUser(u);
        try{
          const snap=await db.collection("users").doc(u.uid).get();
          if(snap.exists){
            const d=snap.data();
            if(d.bloqueado){await auth.signOut();setFbUser(null);setPerfil(null);setCarregando(false);return;}
            setPerfil(d);
          } else {
            // Documento não existe — cria automaticamente
            const isAdmin=ADMIN_EMAILS.includes(u.email?.toLowerCase());
            const novoPerfil={
              nome: isAdmin?"Administrador":"Usuário",
              email:u.email?.toLowerCase()||"",
              role: isAdmin?"admin":"user",
              bloqueado:false,
              criadoEm:firebase.firestore.FieldValue.serverTimestamp(),
            };
            await db.collection("users").doc(u.uid).set(novoPerfil);
            setPerfil(novoPerfil);
          }
        }catch(e){
          // Se Firestore falhar, usa o email para decidir o papel
          const isAdmin=ADMIN_EMAILS.includes(u.email?.toLowerCase());
          setPerfil({nome:isAdmin?"Administrador":"Usuário",email:u.email,role:isAdmin?"admin":"user",bloqueado:false});
        }
      }else{setFbUser(null);setPerfil(null);}
      setCarregando(false);
    });
    return unsub;
  },[]);

  const sair=async()=>{
    try{if(fbUser)await auditLog(fbUser.uid,"LOGOUT",{});}catch{}
    await auth.signOut();
  };

  if(carregando)return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#FCE4EC,#EDE7F6)",gap:16}}>
      <div style={{fontSize:52}}>📖</div>
      <div className="spin" style={{width:40,height:40,border:"4px solid #F4A7B9",borderTopColor:"transparent",borderRadius:"50%"}}/>
      <div style={{color:"#7A6B8A",fontSize:14}}>Carregando...</div>
    </div>
  );

  if(!fbUser)return <TelaLogin/>;

  // Nunca trava: se não tem perfil ainda, mostra loading brevemente
  if(!perfil)return(
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#FCE4EC,#EDE7F6)",gap:16}}>
      <div style={{fontSize:52}}>📖</div>
      <div className="spin" style={{width:40,height:40,border:"4px solid #F4A7B9",borderTopColor:"transparent",borderRadius:"50%"}}/>
      <div style={{color:"#7A6B8A",fontSize:14}}>Configurando conta...</div>
    </div>
  );

  if(perfil?.bloqueado)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#FEF6F0",padding:20}}>
      <div style={{background:"#FFEBEE",borderRadius:20,padding:"32px 28px",textAlign:"center",maxWidth:340,border:"2px solid #EF5350"}}>
        <div style={{fontSize:48,marginBottom:12}}>🔒</div>
        <div style={{color:"#4A3F5C",fontSize:18,fontWeight:800,marginBottom:8}}>Conta bloqueada</div>
        <div style={{color:"#7A6B8A",fontSize:13,lineHeight:1.6}}>Sua conta foi bloqueada pelo administrador.<br/>Entre em contato com Ademir.</div>
        <button onClick={sair} style={{marginTop:16,background:"#FFEBEE",color:"#EF5350",border:"1px solid #EF5350",borderRadius:10,padding:"8px 20px",fontWeight:700,cursor:"pointer"}}>Sair</button>
      </div>
    </div>
  );

  if(perfil?.role==="admin")return <TelaAdmin user={fbUser} perfil={perfil} sair={sair}/>;

  return <TelaDiario user={fbUser} perfil={perfil} sair={sair} T={T} darkMode={darkMode} setDarkMode={setDarkMode}/>;
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

</script>

</body>
</html>
